[tools]
# Core development tools
python = "3.14"
go = "1.26"
node = "25"
neovim = "latest"
uv = "latest"

# Python
"pipx:debugpy" = "latest"
"pipx:ruff" = "latest"
"pipx:ty" = "latest"

# Additional useful tools
stylua = "latest"
fd = "latest"
ripgrep = "latest"
fzf = "latest"
tree-sitter = "latest"

# CI/CD testing tools
# act = "latest"

# AI
opencode = "latest"
claude-code = "latest"

# Linting tools (installed via pipx since they're Python CLIs)
# "pipx:ansible/ansible-lint" = "latest"
# "pipx:yamllint" = "latest"

# Misc tools
tlrc = "latest"
jq = "latest"
yq = "latest"

[settings]
# Enable experimental features if needed
experimental = false

# Plugin settings
[settings.python]
# Use uv for Python package management
uv_venv_auto = true
