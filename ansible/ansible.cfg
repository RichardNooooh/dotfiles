[defaults]
# Host key checking can be disabled for local/CI environments
# Set to True for production environments with proper SSH key management
host_key_checking = False

# Disable retry files to avoid clutter
retry_files_enabled = False

# Use YAML output for better readability
stdout_callback = yaml

# Enable timing information for tasks
callbacks_enabled = profile_tasks

# Show task path for debugging
task_debugger = off

# Merge variables from multiple sources
hash_behaviour = merge

# Default timeout for connections
timeout = 30

# Disable cowsay for cleaner output
nocows = 1

# Use FQCN by default (validates proper naming)
# This ensures all modules use full collection names
default_module_name = ansible.builtin

[privilege_escalation]
# Default privilege escalation settings
become = false
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
# SSH connection optimizations
pipelining = true
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
control_path_dir = /tmp
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Speed up connections by reusing SSH connections
retries = 3

[inventory]
# Enable inventory caching for large inventories
cache = false

[colors]
# Color scheme for output
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecated = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
