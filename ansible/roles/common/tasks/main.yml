---
# Common role - base system packages
# Uses generic package module with OS-specific variable files

- name: common | Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"

- name: common | Update package cache and install base packages
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present
    update_cache: true

- name: common | Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.local/bin"
    state: directory
    mode: "0755"
  become: false

- name: common | Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.local/share/fonts"
    state: directory
    mode: "0755"
  become: false
