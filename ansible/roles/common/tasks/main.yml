---
# Common role - base system packages
- name: common | Update package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['os_family'] == "Debian"

- name: common | Update package cache (Arch)
  ansible.builtin.pacman:
    update_cache: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: common | Update package cache (RedHat)
  ansible.builtin.dnf:
    update_cache: true
  when: ansible_facts['os_family'] == "RedHat"

- name: common | Install base packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - zsh
      - stow
      - curl
      - wget
      - git
      - unzip
      - zip
      - tar
      - make
      - gcc
      - g++
      - build-essential
      - python3
      - python3-pip
      - python3-venv
      - ripgrep
      - fd-find
      - tmux
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: common | Install base packages (Arch)
  ansible.builtin.pacman:
    name:
      - zsh
      - stow
      - curl
      - wget
      - git
      - unzip
      - zip
      - tar
      - make
      - gcc
      - python
      - python-pip
      - ripgrep
      - fd
      - tmux
    state: present
  when: ansible_facts['os_family'] == "Archlinux"

- name: common | Install base packages (RedHat/Fedora)
  ansible.builtin.dnf:
    name:
      - zsh
      - stow
      - curl
      - wget
      - git
      - unzip
      - zip
      - tar
      - make
      - gcc
      - gcc-c++
      - python3
      - python3-pip
      - ripgrep
      - fd-find
      - tmux
    state: present
  when: ansible_facts['os_family'] == "RedHat"

- name: common | Install base packages (Alpine)
  ansible.builtin.apk:
    name:
      - zsh
      - stow
      - curl
      - wget
      - git
      - unzip
      - zip
      - tar
      - make
      - gcc
      - g++
      - python3
      - py3-pip
      - ripgrep
      - fd
      - tmux
    state: present
  when: ansible_facts['os_family'] == "Alpine"

- name: common | Install base packages (SUSE)
  community.general.zypper:
    name:
      - zsh
      - stow
      - curl
      - wget
      - git
      - unzip
      - zip
      - tar
      - make
      - gcc
      - gcc-c++
      - python3
      - python3-pip
      - ripgrep
      - fd
      - tmux
    state: present
  when: ansible_facts['os_family'] == "Suse"

- name: common | Ensure local bin directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.local/bin"
    state: directory
    mode: "0755"
  become: false

- name: common | Ensure fonts directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.local/share/fonts"
    state: directory
    mode: "0755"
  become: false
