---
- name: Verify
  hosts: all
  gather_facts: true

  vars:
    test_user: "molecule"
    test_home: "/home/molecule"

  tasks:
    - name: Check if required packages are installed
      ansible.builtin.package:
        name:
          - zsh
          - stow
          - git
          - curl
          - make
          - tmux
        state: present
      check_mode: true
      register: pkg_check
      changed_when: false
      failed_when: pkg_check is failed

    - name: Verify directories exist for test user
      ansible.builtin.stat:
        path: "{{ test_home }}/{{ item }}"
      loop:
        - .local/bin
        - .local/share/fonts
      register: dir_check

    - name: Assert directories were created
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isdir
        fail_msg: "Directory {{ item.item }} was not created at {{ test_home }}/{{ item.item }}"
      loop: "{{ dir_check.results }}"

    - name: Verify directory ownership
      ansible.builtin.shell:
        cmd: stat -c '%U' "{{ test_home }}/.local/bin"
      register: dir_owner
      changed_when: false

    - name: Assert directories are owned by test user (not root)
      ansible.builtin.assert:
        that:
          - dir_owner.stdout == test_user
        fail_msg: "Directory {{ test_home }}/.local/bin is owned by {{ dir_owner.stdout }}, not {{ test_user }} - privilege escalation issue detected"

    - name: Verify ripgrep is installed
      ansible.builtin.command:
        cmd: which rg
      register: rg_check
      changed_when: false
      ignore_errors: true

    - name: Verify fd/fdfind is installed
      ansible.builtin.shell: command -v fd || command -v fdfind
      register: fd_check
      changed_when: false
      ignore_errors: true

    - name: Assert search tools are available
      ansible.builtin.assert:
        that:
          - rg_check.rc == 0
          - fd_check.rc == 0
        fail_msg: "Search tools (ripgrep/fd) not found"
      ignore_errors: true

    - name: Display verification results
      ansible.builtin.debug:
        msg:
          - "Common role verification passed on {{ ansible_facts['distribution'] }}"
          - "Test user: {{ test_user }}"
          - "Directories owned by: {{ dir_owner.stdout }}"
          - "Packages installed: OK"
          - "Search tools: ripgrep={{ 'OK' if rg_check.rc == 0 else 'MISSING' }}, fd={{ 'OK' if fd_check.rc == 0 else 'MISSING' }}"
