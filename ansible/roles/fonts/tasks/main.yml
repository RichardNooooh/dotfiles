---
# Fonts role - install JetBrainsMono font
- name: fonts | Ensure font directory exists
  ansible.builtin.file:
    path: "{{ fonts_install_dir }}"
    state: directory
    mode: "0755"
  become: false

- name: fonts | Check if JetBrainsMono is installed
  ansible.builtin.find:
    paths: "{{ fonts_install_dir }}"
    patterns: "JetBrainsMono*.ttf"
  register: fonts_files

- name: fonts | Download JetBrainsMono archive
  ansible.builtin.get_url:
    url: "{{ fonts_url }}"
    dest: "/tmp/JetBrainsMono.zip"
    mode: "0644"
  when: fonts_files.matched == 0
  become: false

- name: fonts | Create temporary extraction directory
  ansible.builtin.file:
    path: "/tmp/jetbrains_fonts"
    state: directory
    mode: "0755"
  when: fonts_files.matched == 0

- name: fonts | Extract font archive
  ansible.builtin.unarchive:
    src: "/tmp/JetBrainsMono.zip"
    dest: "/tmp/jetbrains_fonts"
    remote_src: true
  when: fonts_files.matched == 0

- name: fonts | Copy font files to fonts directory
  ansible.builtin.shell:
    cmd: find /tmp/jetbrains_fonts -name "*.ttf" -exec cp {} "{{ fonts_install_dir }}/" \;
    executable: /bin/bash
  when: fonts_files.matched == 0
  register: fonts_copy_result
  changed_when: fonts_copy_result.rc == 0
  failed_when: fonts_copy_result.rc != 0
  notify: "refresh font cache"

- name: fonts | Clean up temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/JetBrainsMono.zip"
    - "/tmp/jetbrains_fonts"
  when: fonts_files.matched == 0

- name: fonts | Verify font installation
  ansible.builtin.shell:
    cmd: fc-list | grep -i jetbrains | head -5
    executable: /bin/bash
  register: fonts_list
  changed_when: false
  failed_when: false

- name: fonts | Display installed fonts
  ansible.builtin.debug:
    msg: "{{ fonts_list.stdout_lines | default(['Font verification skipped or failed']) }}"
