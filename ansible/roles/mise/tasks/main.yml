---
# Mise role - install mise and development tools
- name: mise | Check if mise is already installed
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.local/bin/mise"
  register: mise_installed

- name: mise | Download and install mise
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mise.run | MISE_INSTALL_PATH={{ dotfiles_home }}/.local/bin/mise sh
  register: mise_install_result
  when: not mise_installed.stat.exists
  changed_when: mise_install_result.rc == 0

- name: mise | Ensure mise is in PATH
  ansible.builtin.lineinfile:
    path: "{{ dotfiles_home }}/.zshenv"
    line: 'export PATH="{{ dotfiles_home }}/.local/bin:$PATH"'
    create: true
    mode: "0644"

- name: mise | Ensure mise is activated in zsh
  ansible.builtin.lineinfile:
    path: "{{ dotfiles_home }}/.zshrc"
    line: 'eval "$(mise activate zsh)"'
    create: true
    mode: "0644"

- name: mise | Ensure mise is activated in bash
  ansible.builtin.lineinfile:
    path: "{{ dotfiles_home }}/.bashrc"
    line: 'eval "$(mise activate bash)"'
    create: true
    mode: "0644"

- name: mise | Check for mise.toml in dotfiles
  ansible.builtin.stat:
    path: "{{ dotfiles_repo }}/mise.toml"
  register: mise_config_exists

- name: mise | Link mise.toml to home if it doesn't exist
  ansible.builtin.file:
    src: "{{ dotfiles_repo }}/mise.toml"
    dest: "{{ dotfiles_home }}/.config/mise/config.toml"
    state: link
    force: false
  when:
    - mise_config_exists.stat is defined
    - mise_config_exists.stat.exists | default(false)

- name: mise | Trust mise configuration
  ansible.builtin.shell:
    cmd: |
      export PATH="{{ dotfiles_home }}/.local/bin:$PATH"
      {{ dotfiles_home }}/.local/bin/mise trust {{ dotfiles_repo }}/mise.toml
  when:
    - mise_config_exists.stat is defined
    - mise_config_exists.stat.exists | default(false)
  register: mise_trust
  changed_when: false

- name: mise | Install tools via mise
  ansible.builtin.shell:
    cmd: |
      export PATH="{{ dotfiles_home }}/.local/bin:$PATH"
      eval "$(mise activate bash)"
      cd {{ dotfiles_repo }}
      mise install
  args:
    executable: /bin/bash
  register: mise_install
  changed_when: "'Installed' in mise_install.stdout or 'Installing' in mise_install.stdout"
  timeout: 300

- name: mise | Verify mise installation
  ansible.builtin.shell:
    cmd: |
      export PATH="{{ dotfiles_home }}/.local/bin:$PATH"
      {{ dotfiles_home }}/.local/bin/mise --version
  register: mise_version
  changed_when: false

- name: mise | Display mise version
  ansible.builtin.debug:
    msg: "mise version: {{ mise_version.stdout }}"

- name: mise | Verify installed tools
  ansible.builtin.shell:
    cmd: |
      export PATH="{{ dotfiles_home }}/.local/bin:$PATH"
      eval "$(mise activate bash)"
      echo "Neovim: $(nvim --version | head -1)"
      echo "Python: $(python --version)"
      echo "Go: $(go version)"
      echo "Node: $(node --version)"
      echo "uv: $(uv --version)"
  args:
    executable: /bin/bash
  register: tool_versions
  changed_when: false

- name: mise | Display installed tool versions
  ansible.builtin.debug:
    msg: "{{ tool_versions.stdout_lines }}"
