---
# Shell role - Oh My Zsh and zsh configuration
- name: shell | Check if Oh My Zsh is installed
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.oh-my-zsh"
  register: shell_omz_installed
  become: false

- name: shell | Download Oh My Zsh install script
  ansible.builtin.get_url:
    url: "{{ shell_oh_my_zsh_repo }}"
    dest: /tmp/oh-my-zsh-install.sh
    mode: "0755"
  when: not shell_omz_installed.stat.exists
  become: false

- name: shell | Install Oh My Zsh
  ansible.builtin.shell:
    cmd: |
      KEEP_ZSHRC=yes sh /tmp/oh-my-zsh-install.sh --unattended
    creates: "{{ dotfiles_home }}/.oh-my-zsh"
  environment:
    HOME: "{{ dotfiles_home }}"
  when: not shell_omz_installed.stat.exists
  become: false

- name: shell | Ensure Oh My Zsh is owned by user
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.oh-my-zsh"
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    recurse: true
  when: not shell_omz_installed.stat.exists
  become: true

- name: shell | Clean up Oh My Zsh install script
  ansible.builtin.file:
    path: /tmp/oh-my-zsh-install.sh
    state: absent
  when: not shell_omz_installed.stat.exists
  become: false

- name: shell | Check if .zshrc exists
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.zshrc"
  register: shell_zshrc_exists
  become: false

- name: shell | Backup existing .zshrc if not a symlink
  ansible.builtin.command:
    cmd: "mv {{ dotfiles_home }}/.zshrc {{ dotfiles_home }}/.zshrc.backup"
  when:
    - shell_zshrc_exists.stat.exists
    - not shell_zshrc_exists.stat.islnk
  become: false
  changed_when: true
  failed_when: false

- name: shell | Change default shell to zsh
  ansible.builtin.user:
    name: "{{ dotfiles_user }}"
    shell: "{{ shell_default_shell }}"
  become: true
  become_user: root

- name: shell | Verify shell change
  ansible.builtin.shell:
    cmd: "set -o pipefail && getent passwd {{ dotfiles_user }} | cut -d: -f7"
    executable: /bin/bash
  register: shell_current
  changed_when: false

- name: shell | Display current shell
  ansible.builtin.debug:
    msg: "Default shell is now: {{ shell_current.stdout }}"

- name: shell | Create .zshenv if it doesn't exist
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.zshenv"
    state: touch
    mode: "0644"
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
  become: true
