---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    dotfiles_user: "molecule"
    dotfiles_home: "/home/molecule"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Install zsh, curl, and git
      ansible.builtin.apt:
        name:
          - zsh
          - curl
          - git
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Create test user
      ansible.builtin.user:
        name: molecule
        shell: /bin/bash
        home: /home/molecule
        create_home: true

    - name: Ensure home directory has correct ownership
      ansible.builtin.file:
        path: /home/molecule
        state: directory
        owner: molecule
        group: molecule
        mode: "0755"
      changed_when: false

    - name: Remove any existing Oh My Zsh installation (prevents conflicts)
      ansible.builtin.file:
        path: /root/.oh-my-zsh
        state: absent
      changed_when: false

  roles:
    - role: shell
