---
- name: Converge
  hosts: all
  become: true

  vars:
    dotfiles_repo: "/home/molecule/.dotfiles"
    dotfiles_stow_folders: "zsh,tmux"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - stow
          - git
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Create test user
      ansible.builtin.user:
        name: molecule
        shell: /bin/bash
        home: /home/molecule
        create_home: true

    - name: Create dotfiles directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /home/molecule/.dotfiles
        - /home/molecule/.dotfiles/zsh
        - /home/molecule/.dotfiles/tmux

    - name: Create test config files
      ansible.builtin.copy:
        content: "# Test zshrc"
        dest: "/home/molecule/.dotfiles/zsh/.zshrc"

    - name: Create test tmux config
      ansible.builtin.copy:
        content: "# Test tmux.conf"
        dest: "/home/molecule/.dotfiles/tmux/.tmux.conf"

    - name: Create mock mise.toml
      ansible.builtin.copy:
        content: |
          [tools]
          python = "latest"
        dest: "/home/molecule/.dotfiles/mise.toml"

    - name: Change ownership
      ansible.builtin.file:
        path: /home/molecule
        state: directory
        recurse: true
        owner: molecule
        group: molecule
      changed_when: false

  roles:
    - role: dotfiles
      become: false
