---
- name: Converge
  hosts: all
  become: true

  vars:
    dotfiles_user: "molecule"
    dotfiles_home: "/home/molecule"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Create test user
      ansible.builtin.user:
        name: molecule
        shell: /bin/bash
        home: /home/molecule
        create_home: true

    - name: Ensure .local/bin directory exists
      ansible.builtin.file:
        path: /home/molecule/.local/bin
        state: directory
        mode: "0755"

    - name: Create dotfiles directory
      ansible.builtin.file:
        path: /home/molecule/.dotfiles
        state: directory
        mode: "0755"

    - name: Create mock mise.toml for testing
      ansible.builtin.copy:
        content: |
          [tools]
          python = "latest"
          node = "latest"
          uv = "latest"
        dest: /home/molecule/.dotfiles/mise.toml

    - name: Create .config/mise directory
      ansible.builtin.file:
        path: /home/molecule/.config/mise
        state: directory
        mode: "0755"

    - name: Change ownership
      ansible.builtin.file:
        path: /home/molecule
        state: directory
        recurse: true
        owner: molecule
        group: molecule
      changed_when: false

  roles:
    - role: uv
      become: false
