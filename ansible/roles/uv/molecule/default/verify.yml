---
- name: Verify
  hosts: all
  gather_facts: false
  
  tasks:
    - name: Check if uv is available
      ansible.builtin.shell:
        cmd: |
          export PATH="/home/molecule/.local/bin:$PATH"
          eval "$(mise activate bash)"
          which uv
        executable: /bin/bash
      register: uv_check
      changed_when: false
      ignore_errors: true

    - name: Display uv status
      ansible.builtin.debug:
        msg: "uv found: {{ uv_check.rc == 0 }}"

    - name: Display verification results
      ansible.builtin.debug:
        msg: "UV role verification completed (uv may be installed via mise in actual use)"
