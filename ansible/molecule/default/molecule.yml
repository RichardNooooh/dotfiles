---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: docker

platforms:
  - name: ubuntu-full-test
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        dotfiles_user: "molecule"
        dotfiles_home: "/home/molecule"
        dotfiles_repo: "/home/molecule/.dotfiles"
        dotfiles_github_user: "molecule"
        dotfiles_stow_folders: "zsh,tmux"
        shell_oh_my_zsh_repo: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"
        shell_default_shell: /usr/bin/zsh

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
