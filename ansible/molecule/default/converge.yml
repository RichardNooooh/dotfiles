---
- name: Converge
  hosts: all
  become: true

  vars:
    dotfiles_repo: "/home/molecule/.dotfiles"
    fonts_url: "https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip"
    fonts_install_dir: "/home/molecule/.local/share/fonts"
    dotfiles_stow_folders: "zsh,tmux"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Create test user
      ansible.builtin.user:
        name: molecule
        shell: /bin/bash
        home: /home/molecule
        create_home: true

    - name: Create test config files
      ansible.builtin.copy:
        content: "# Test config"
        dest: "{{ item }}"
        mode: "0644"
      loop:
        - /home/molecule/.dotfiles/zsh/.zshrc
        - /home/molecule/.dotfiles/tmux/.tmux.conf

    - name: Change ownership
      ansible.builtin.file:
        path: /home/molecule
        state: directory
        recurse: true
        owner: molecule
        group: molecule
      changed_when: false

  roles:
    - role: common
    - role: dotfiles
      become: false
    - role: shell
    - role: fonts
      become: false
    - role: mise
      become: false
    - role: uv
      become: false
    - role: neovim
      become: false
